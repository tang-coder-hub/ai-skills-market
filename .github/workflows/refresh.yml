name: Refresh Trending

on:
  schedule:
    # hot: every 12 hours (00:30 & 12:30 UTC)
    - cron: "30 0,12 * * *"
    # daily: every day at 01:00 UTC
    - cron: "0 1 * * *"
    # weekly: every Monday at 01:30 UTC
    - cron: "30 1 * * 1"
    # monthly: 1st of month at 02:00 UTC
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      period:
        description: "Which period to refresh (leave empty = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh trending data
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: python scripts/refresh_trending.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-refresh trending data [skip ci]"
            git push
          fi
